[package]
name = "chaos-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[[bin]]
name = "chaos"
path = "src/main.rs"

[lib]
name = "chaos_boot"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive"] }
clap_complete = { workspace = true }
chaos-argv = { workspace = true }
chaos-getopt = { workspace = true }
chaos-sysctl = { workspace = true }
chaos-kern = { workspace = true }
chaos-fork = { workspace = true }
chaos-selinux = { workspace = true }
chaos-pam = { workspace = true }
chaos-mcphost = { workspace = true }
chaos-ipc = { workspace = true }
chaos-xserver = { workspace = true }
rama = { workspace = true }
libc = { workspace = true }
owo-colors = { workspace = true }
regex-lite = { workspace = true }
serde_json = { workspace = true }
supports-color = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
] }
toml = { workspace = true }
tracing = { workspace = true }
tracing-appender = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
assert_matches = { workspace = true }
chaos-which = { workspace = true }
predicates = { workspace = true }
pretty_assertions = { workspace = true }
sqlx = { workspace = true }
