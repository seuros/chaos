[package]
name = "chaos-console"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
name = "chaos_console"
path = "src/lib.rs"

[features]
default = ["syntax"]
# Enable vt100-based tests (emulator) when running with `--features vt100-tests`.
vt100-tests = ["libui/vt100-tests"]
# Gate verbose debug logging inside the TUI implementation.
debug-logs = []
# Syntax highlighting via chaos-highlight (syntect + two-face).
syntax = ["libui/syntax"]

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive"] }
chaos-termcap = { workspace = true }
chaos-argv = { workspace = true }
chaos-coreboot = { workspace = true }
chaos-kern = { workspace = true }
chaos-session = { workspace = true }
chaos-locate = { workspace = true }
chaos-pam = { workspace = true }
chaos-pwd = { workspace = true }
chaos-syslog = { workspace = true }
chaos-ipc = { workspace = true }
chaos-proc = { workspace = true }
chaos-realpath = { workspace = true }
chaos-getopt = { workspace = true }
color-eyre = { workspace = true }
crossterm = { workspace = true, features = ["bracketed-paste", "event-stream"] }
jiff = { workspace = true }
pulldown-cmark = { workspace = true }
rand = { workspace = true }
ratatui-hypertile = { workspace = true }
ratatui-hypertile-extras = { workspace = true }
ratatui = { workspace = true, features = [
    "scrolling-regions",
    "unstable-backend-writer",
    "unstable-rendered-line-info",
    "unstable-widget-ref",
] }
ratatui-macros = { workspace = true }
serde_json = { workspace = true, features = ["preserve_order"] }
shlex = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
    "test-util",
    "time",
] }
tokio-stream = { workspace = true, features = ["sync"] }
toml = { workspace = true }
toml_edit = { workspace = true }
tracing = { workspace = true, features = ["log"] }
tracing-appender = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
unicode-width = { workspace = true }
webbrowser = { workspace = true }
uuid = { workspace = true }
chaos-snitch = { workspace = true }
libui = { workspace = true }


[dev-dependencies]
chaos-cli = { workspace = true }
chaos-kern = { workspace = true }
chaos-which = { workspace = true }
chaos-pty = { workspace = true }
assert_matches = { workspace = true }
insta = { workspace = true }
libui = { workspace = true, features = ["testing"] }
pretty_assertions = { workspace = true }
rand = { workspace = true }
serial_test = { workspace = true }
uuid = { workspace = true }

[package.metadata.cargo-shear]
ignored = ["ratatui-macros"]
