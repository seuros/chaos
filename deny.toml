# Chaos cargo-deny configuration
# We are Apache-2.0 FOSS — permissive by default.

[graph]
all-features = false
no-default-features = false

[advisories]
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode unmaintained; pulled via syntect dump-load for pre-compiled grammars" },
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin Attack timing side-channel; no fix available, pulled transitively via sqlx-mysql" },
]

[licenses]
# FOSS project — accept all OSI-approved and common permissive licenses.
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "bzip2-1.0.6",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "allow"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
