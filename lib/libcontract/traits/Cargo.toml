[package]
name = "chaos-traits"
description = "Narrow trait abstractions for decoupling chaos-kern orchestration into satellite crates"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[dependencies]
chaos-ipc = { workspace = true }
chaos-sysctl = { workspace = true }
chaos-syslog = { workspace = true }
async-channel = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
anyhow = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
inventory = { workspace = true }
mcp-host = { workspace = true }

[lints]
workspace = true

[package.metadata.cargo-shear]
ignored = ["tokio", "serde"]
