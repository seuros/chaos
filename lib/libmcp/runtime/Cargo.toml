[package]
name = "chaos-mcp-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "MCP connection/session runtime for chaos — kernel-facing DTOs, no mcp-guest types in the public API"

[lib]
name = "chaos_mcp_runtime"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
mcp-guest = { workspace = true, features = ["stdio", "http"] }
chaos-ipc = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "macros", "time"] }
tracing = { workspace = true }
thiserror = { workspace = true }
indexmap = { workspace = true }
