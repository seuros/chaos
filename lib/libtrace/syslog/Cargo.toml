[package]
name = "chaos-syslog"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
doctest = false
name = "chaos_syslog"
path = "src/lib.rs"

[lints]
workspace = true

[features]
## Disables the built-in default metrics exporter.
##
## Intended for use from `dev-dependencies` so unit/integration tests never
## attempt to export metrics over the network.
disable-default-metrics-exporter = []

[dependencies]
jiff = { workspace = true }
chaos-realpath = { workspace = true }
chaos-wchar = { workspace = true }
chaos-parrot = { workspace = true }
chaos-ipc = { workspace = true }
gethostname = { workspace = true }
opentelemetry-appender-tracing = { workspace = true }
opentelemetry-http = { workspace = true }
opentelemetry-otlp = { workspace = true, features = [
    "grpc-tonic",
    "http-proto",
    "http-json",
    "logs",
    "metrics",
    "trace",
    "tls",
    "tls-roots",
]}
opentelemetry_sdk = { workspace = true, features = [
    "experimental_trace_batch_span_processor_with_async_runtime",
    "experimental_metrics_custom_reader",
    "logs",
    "metrics",
    "rt-tokio",
    "testing",
    "trace",
] }
http = { workspace = true }
os_info = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
strum_macros = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
rama = { workspace = true }
tracing = { workspace = true }
tracing-opentelemetry = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
opentelemetry_sdk = { workspace = true, features = [
    "experimental_metrics_custom_reader",
    "testing",
] }
pretty_assertions = { workspace = true }

[package.metadata.cargo-shear]
ignored = ["opentelemetry_sdk"]
