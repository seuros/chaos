[package]
name = "chaos-mcphost"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[lib]
name = "chaos_mcphost"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
chaos-argv = { workspace = true }
chaos-cron = { workspace = true }
chaos-kern = { workspace = true }
chaos-ipc = { workspace = true }
chaos-storage = { workspace = true }
chaos-sh = { workspace = true }
chaos-proc = { workspace = true }
chaos-getopt = { workspace = true }
chaos-conv = { workspace = true }
mcp-host = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
state-machines = { workspace = true }
shlex = { workspace = true }
tokio = { workspace = true, features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
] }
tracing = { workspace = true, features = ["log"] }
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }

[dev-dependencies]
core_test_support = { workspace = true }
mcp-host = { workspace = true }
mcp_test_support = { workspace = true }
os_info = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
wiremock = { workspace = true }
