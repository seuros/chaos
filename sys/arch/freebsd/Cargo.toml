[package]
name = "alcatraz-freebsd"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true

[[bin]]
name = "alcatraz-freebsd"
path = "src/main.rs"

[lib]
name = "alcatraz_freebsd"
path = "src/lib.rs"

[lints]
workspace = true

[target.'cfg(target_os = "freebsd")'.dependencies]
alcatraz-base = { workspace = true }
clap = { workspace = true, features = ["derive"] }
chaos-ipc = { workspace = true }
chaos-pf = { workspace = true }
chaos-realpath = { workspace = true }
dbus-secret-service-keyring-store = { workspace = true }
keyring-core = { workspace = true }
libc = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["process"] }
url = { workspace = true }

[target.'cfg(target_os = "freebsd")'.dev-dependencies]
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
] }

[package.metadata.cargo-shear]
ignored = ["tokio", "serde_json", "url", "chaos-kern", "serde", "chaos-realpath"]
