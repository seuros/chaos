[package]
edition.workspace = true
license.workspace = true
publish.workspace = true
name = "chaos-kern"
version.workspace = true

[lib]
doctest = false
name = "chaos_kern"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
arc-swap = "1.8.2"
async-channel = { workspace = true }
async-trait = { workspace = true }
askama = { workspace = true }
base64 = { workspace = true }
bm25 = { workspace = true }
chardetng = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
clap = { workspace = true, features = ["derive"] }
codex-api = { workspace = true }
chaos-diff = { workspace = true }
chaos-arsenal = { workspace = true }
chaos-concierge = { workspace = true }
chaos-traits = { workspace = true }
chaos-memento = { workspace = true }
chaos-rollout = { workspace = true }
chaos-watchdog = { workspace = true }
chaos-epoll = { workspace = true }
codex-client = { workspace = true }
chaos-sysctl = { workspace = true }
chaos-sh = { workspace = true }
chaos-selinux = { workspace = true }
chaos-locate = { workspace = true }
chaos-scm = { workspace = true }
chaos-dtrace = { workspace = true }
chaos-keyring = { workspace = true }
chaos-pf = { workspace = true }
chaos-syslog = { workspace = true }
chaos-ipc = { workspace = true }
mcp-guest = { workspace = true, features = ["http"] }
chaos-proc = { workspace = true }
chaos-realpath = { workspace = true }
chaos-tmpfs = { workspace = true }
chaos-pixbuf = { workspace = true }
chaos-pwd = { workspace = true }
chaos-pty = { workspace = true }
chaos-ready = { workspace = true }
chaos-vault = { workspace = true }
chaos-wchar = { workspace = true }
chaos-lex = { workspace = true }
csv = { workspace = true }
dirs = { workspace = true }
dunce = { workspace = true }
encoding_rs = { workspace = true }
env-flags = { workspace = true }
eventsource-stream = { workspace = true }
futures = { workspace = true }
http = { workspace = true }
iana-time-zone = { workspace = true }
image = { workspace = true, features = ["jpeg", "png", "webp"] }
indexmap = { workspace = true }
keyring = { workspace = true, features = ["crypto-rust"] }
libc = { workspace = true }
notify = { workspace = true }
os_info = { workspace = true }
rand = { workspace = true }
regex-lite = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha1 = { workspace = true }
sha2 = { workspace = true }
shlex = { workspace = true }
similar = { workspace = true }
state-machines = { workspace = true, features = ["dynamic", "async"] }
tempfile = { workspace = true }
test-log = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true, features = [
    "formatting",
    "parsing",
    "local-offset",
    "macros",
] }
tokio = { workspace = true, features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
] }
tokio-util = { workspace = true, features = ["rt"] }
rama = { workspace = true }
toml = { workspace = true }
toml_edit = { workspace = true }
tracing = { workspace = true, features = ["log"] }
url = { workspace = true }
uuid = { workspace = true, features = ["serde", "v4", "v5"] }
which = { workspace = true }
wildmatch = { workspace = true }
zip = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
alcatraz-linux = { workspace = true }
keyring = { workspace = true, features = ["linux-native-async-persistent"] }
landlock = { workspace = true }
seccompiler = { workspace = true }

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = "0.9"
keyring = { workspace = true, features = ["apple-native"] }

# Build OpenSSL from source for musl builds.
[target.x86_64-unknown-linux-musl.dependencies]
openssl-sys = { workspace = true, features = ["vendored"] }

# Build OpenSSL from source for musl builds.
[target.aarch64-unknown-linux-musl.dependencies]
openssl-sys = { workspace = true, features = ["vendored"] }


[target.'cfg(any(target_os = "freebsd", target_os = "openbsd"))'.dependencies]
keyring = { workspace = true, features = ["sync-secret-service"] }

[target.'cfg(unix)'.dependencies]
chaos-doas = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
assert_matches = { workspace = true }
chaos-argv = { workspace = true }
chaos-syslog = { workspace = true, features = [
    "disable-default-metrics-exporter",
] }
chaos-check = { workspace = true }
chaos-which = { workspace = true }
core_test_support = { workspace = true }
ctor = { workspace = true }
insta = { workspace = true }
maplit = { workspace = true }
opentelemetry = { workspace = true }
predicates = { workspace = true }
pretty_assertions = { workspace = true }
test-case = "3.3.1"
opentelemetry_sdk = { workspace = true, features = [
    "experimental_metrics_custom_reader",
    "metrics",
] }
serial_test = { workspace = true }
tempfile = { workspace = true }
tracing-opentelemetry = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-test = { workspace = true, features = ["no-env-filter"] }
walkdir = { workspace = true }
wiremock = { workspace = true }
zstd = { workspace = true }

[package.metadata.cargo-shear]
ignored = ["openssl-sys"]
